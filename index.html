<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Alphabet Warriors!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{position:fixed;width:100%;height:100%;overflow:hidden}
    body{
      width:100%;height:100%;overflow:hidden;
      font-family:'Nunito',sans-serif;
      background:#fff8fe;
      background-image:
        radial-gradient(ellipse at 15% 15%,rgba(255,110,180,.18) 0%,transparent 52%),
        radial-gradient(ellipse at 85% 85%,rgba(168,85,247,.18) 0%,transparent 52%),
        radial-gradient(ellipse at 50% 50%,rgba(255,217,61,.08) 0%,transparent 60%);
      touch-action:manipulation;
    }

    /* ═══ SCREENS ═══ */
    .screen{
      display:none;position:fixed;inset:0;width:100%;height:100%;
      flex-direction:column;align-items:center;justify-content:center;
      padding:max(10px,env(safe-area-inset-top))
              max(10px,env(safe-area-inset-right))
              max(10px,env(safe-area-inset-bottom))
              max(10px,env(safe-area-inset-left));
      overflow-y:auto;overflow-x:hidden;gap:clamp(7px,1.6vh,14px);
    }
    .screen.active{display:flex}

    /* ═══ SHARED BUTTONS ═══ */
    .btn{
      font-family:'Fredoka One',cursive;
      border:none;border-radius:clamp(14px,3vw,20px);
      padding:clamp(13px,2.3vh,19px) clamp(20px,4vw,34px);
      cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
      transition:transform .13s,box-shadow .13s;white-space:nowrap;width:100%;
      font-size:clamp(18px,3.2vw,25px);
    }
    .btn:hover{transform:scale(1.04) translateY(-2px)}
    .btn:active{transform:scale(0.95)}
    .btn-green{background:linear-gradient(135deg,#22c55e,#14b8a6);color:#fff;box-shadow:0 8px 22px rgba(34,197,94,.4)}
    .btn-back {background:linear-gradient(135deg,#94a3b8,#64748b);color:#fff;box-shadow:0 8px 22px rgba(100,116,139,.3)}

    /* ═══════════════════════════════════
       HOME SCREEN
    ═══════════════════════════════════ */
    #home-screen{gap:clamp(10px,2.2vh,20px)}

    .logo{
      font-family:'Fredoka One',cursive;
      font-size:clamp(36px,8vw,62px);line-height:1.0;
      background:linear-gradient(135deg,#ff6eb4,#a855f7,#3b82f6);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      text-align:center;
    }
    .tagline{
      font-family:'Fredoka One',cursive;
      font-size:clamp(17px,3.8vw,28px);
      color:#c084fc;text-align:center;letter-spacing:.5px;
    }

    .home-main-btns{
      display:flex;flex-direction:column;
      gap:clamp(10px,2.2vh,16px);
      width:min(380px,calc(100vw - 24px));flex-shrink:0;
    }
    .home-big-btn{
      border:none;border-radius:clamp(20px,4vw,30px);
      padding:clamp(18px,3.8vh,32px) clamp(24px,5vw,44px);
      display:flex;align-items:center;justify-content:center;
      gap:clamp(12px,2.8vw,20px);
      cursor:pointer;transition:transform .13s,box-shadow .13s;
      position:relative;overflow:hidden;width:100%;
    }
    .home-big-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.16) 0%,transparent 60%);pointer-events:none}
    .home-big-btn:hover{transform:scale(1.04) translateY(-2px)}
    .home-big-btn:active{transform:scale(0.96)}
    .play-btn{
      background:linear-gradient(135deg,#a855f7,#3b82f6);
      box-shadow:0 10px 32px rgba(168,85,247,.42);
    }
    .warrior-home-btn{
      background:linear-gradient(135deg,#ff6eb4 0%,#a855f7 50%,#3b82f6 100%);
      box-shadow:0 10px 32px rgba(168,85,247,.38);
    }
    .hb-icon{font-size:clamp(34px,8vw,54px);line-height:1;flex-shrink:0}
    .hb-label{
      font-family:'Fredoka One',cursive;font-size:clamp(22px,5.5vw,40px);
      color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.18);
    }

    .sound-row{display:flex;justify-content:center;flex-shrink:0}
    .sound-btn{
      background:none;border:none;cursor:pointer;
      font-size:clamp(22px,4vw,32px);padding:6px 14px;border-radius:50%;
      transition:transform .15s;
    }
    .sound-btn:hover{transform:scale(1.2)}

    /* ═══════════════════════════════════
       MODE SELECT SCREEN
    ═══════════════════════════════════ */
    #mode-screen{gap:clamp(8px,1.6vh,14px)}

    /* 4×2 mode grid */
    .modes-grid{
      display:grid;grid-template-columns:repeat(4,1fr);
      gap:clamp(6px,1.3vw,10px);
      width:min(520px,calc(100vw - 20px));flex-shrink:0;
    }
    .mode-card{
      background:#fff;border-radius:clamp(14px,2.5vw,22px);
      padding:clamp(12px,2vh,18px) clamp(5px,1vw,10px);
      border:3px solid #f3e8ff;
      cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;
      box-shadow:0 4px 16px rgba(168,85,247,.08);
      transition:transform .13s,box-shadow .13s,border-color .13s;
      text-align:center;
    }
    .mode-card:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 9px 26px rgba(168,85,247,.22);border-color:#a855f7}
    .mode-card:active{transform:scale(0.95)}
    .mc-icon{font-size:clamp(28px,5.5vw,42px);line-height:1}
    .mc-name{
      font-family:'Fredoka One',cursive;
      font-size:clamp(9px,1.7vw,13px);
      color:#7c3aed;line-height:1.1;
    }

    /* ═══════════════════════════════════
       SHARED GAME TOP BAR
    ═══════════════════════════════════ */
    .g-topbar{
      display:flex;align-items:center;justify-content:space-between;
      gap:clamp(6px,1.6vw,12px);width:100%;max-width:680px;flex-shrink:0;
    }
    .home-btn{
      background:#fff;border-radius:50%;
      width:clamp(42px,7vw,56px);height:clamp(42px,7vw,56px);
      font-size:clamp(18px,3.2vw,26px);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;flex-shrink:0;border:none;
      box-shadow:0 4px 14px rgba(0,0,0,.1);transition:transform .13s;
    }
    .home-btn:hover{transform:scale(1.12)}
    .round-pill{
      background:linear-gradient(135deg,#a855f7,#3b82f6);
      color:#fff;font-family:'Fredoka One',cursive;
      font-size:clamp(11px,2vw,17px);
      padding:clamp(5px,1vh,9px) clamp(10px,1.8vw,18px);
      border-radius:40px;box-shadow:0 4px 14px rgba(168,85,247,.4);
      white-space:nowrap;flex-shrink:0;
    }

    /* star progress */
    .stars-row{
      display:flex;justify-content:center;align-items:center;
      gap:clamp(4px,1.2vw,12px);flex-shrink:0;
    }
    .star{font-size:clamp(20px,4.2vw,36px);filter:grayscale(1);opacity:.18;transition:filter .3s,opacity .3s}
    .star.lit{filter:none;opacity:1;animation:star-pop .45s cubic-bezier(.36,.07,.19,.97)}
    @keyframes star-pop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.5) rotate(10deg)}100%{transform:scale(1) rotate(0)}}

    /* ═══════════════════════════════════
       DRAG & MATCH
    ═══════════════════════════════════ */
    .play-card{
      background:#fff;border-radius:clamp(18px,3.2vw,30px);
      padding:clamp(12px,2vh,22px) clamp(9px,2vw,22px);
      box-shadow:0 10px 36px rgba(168,85,247,.1),0 0 0 3px rgba(168,85,247,.05);
      display:flex;flex-direction:column;align-items:center;
      width:min(660px,calc(100vw - 22px));flex-shrink:0;
      gap:clamp(8px,1.5vh,14px);
    }
    .zone-arrow{
      font-size:clamp(22px,4.5vw,36px);
      opacity:.35;
    }
    .tile-grid{display:flex;justify-content:center;gap:var(--tg)}

    .drop-zone{
      width:var(--ts);height:var(--ts);border-radius:var(--tr);font-size:var(--tf);
      display:flex;align-items:center;justify-content:center;
      font-family:'Fredoka One',cursive;color:#fff;
      position:relative;user-select:none;flex-shrink:0;
      box-shadow:0 5px 15px rgba(0,0,0,.14),inset 0 -4px 0 rgba(0,0,0,.11);
      transition:transform .18s,box-shadow .18s;
      cursor:grab;touch-action:none;
    }
    .drop-zone.over    {transform:scale(1.14);box-shadow:0 0 0 5px #fff,0 0 26px rgba(255,255,255,.9),0 9px 22px rgba(0,0,0,.2)}
    .drop-zone.dragging{opacity:0;cursor:grabbing}
    .drop-zone.matched {animation:match-pop .52s cubic-bezier(.36,.07,.19,.97)}
    .drop-zone.wrong   {animation:shake .38s ease-in-out}
    .letter-card.over  {transform:scale(1.14) translateY(-5px);box-shadow:0 0 0 5px #fff,0 0 26px rgba(255,255,255,.9),0 9px 22px rgba(0,0,0,.2)}


    .letter-card{
      width:var(--ts);height:var(--ts);border-radius:var(--tr);font-size:var(--tf);
      display:flex;align-items:center;justify-content:center;
      font-family:'Fredoka One',cursive;color:#fff;
      cursor:grab;user-select:none;touch-action:none;
      border:3px solid rgba(255,255,255,.4);
      box-shadow:0 5px 15px rgba(0,0,0,.14),inset 0 -4px 0 rgba(0,0,0,.11);
      transition:transform .15s,box-shadow .15s,opacity .2s;flex-shrink:0;
    }
    .letter-card:hover{transform:scale(1.1) translateY(-5px) rotate(-2deg);box-shadow:0 12px 26px rgba(0,0,0,.2)}
    .letter-card.dragging{opacity:0}
    .letter-card.gone{opacity:0;transform:scale(0) rotate(15deg);pointer-events:none;transition:transform .2s,opacity .16s}
    .drop-zone.gone  {opacity:0;transform:scale(0) rotate(15deg);pointer-events:none;transition:transform .22s,opacity .18s}

    .check-badge{
      position:absolute;top:-9px;right:-9px;background:#22c55e;color:#fff;
      font-size:clamp(10px,1.9vw,16px);
      width:clamp(20px,4.2vw,30px);height:clamp(20px,4.2vw,30px);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      box-shadow:0 3px 9px rgba(34,197,94,.55);
      animation:pop-in .24s cubic-bezier(.36,.07,.19,.97);
    }
    @keyframes pop-in{0%{transform:scale(0)}70%{transform:scale(1.35)}100%{transform:scale(1)}}

    /* ═══════════════════════════════════
       FLIP / MEMORY
    ═══════════════════════════════════ */
    .flip-wrap{
      display:flex;flex-direction:column;align-items:center;
      gap:clamp(7px,1.4vh,12px);flex-shrink:0;width:100%;
    }
    .mem-grid{
      display:grid;
      grid-template-columns:repeat(5,var(--ts));
      gap:var(--tg);
      justify-content:center;
    }
    .mem-card{width:var(--ts);height:var(--ts);position:relative;cursor:pointer;perspective:700px}
    .mem-inner{
      width:100%;height:100%;transform-style:preserve-3d;
      transition:transform .4s cubic-bezier(.4,0,.2,1);
    }
    .mem-card.flipped .mem-inner,
    .mem-card.mem-ok  .mem-inner{transform:rotateY(180deg)}
    .mem-face{
      position:absolute;inset:0;border-radius:var(--tr);
      display:flex;align-items:center;justify-content:center;
      font-family:'Fredoka One',cursive;color:#fff;font-size:var(--tf);
      backface-visibility:hidden;-webkit-backface-visibility:hidden;
      box-shadow:0 5px 15px rgba(0,0,0,.14),inset 0 -4px 0 rgba(0,0,0,.11);
      user-select:none;
    }
    .mem-back{background:linear-gradient(145deg,#a855f7,#6d28d9)}
    .mem-front{transform:rotateY(180deg)}
    .mem-card.mem-ok .mem-face{box-shadow:0 0 0 4px #fff,0 0 18px rgba(34,197,94,.7),0 5px 15px rgba(0,0,0,.14)}

    /* ═══════════════════════════════════
       LINE DRAW
    ═══════════════════════════════════ */
    .line-card{
      background:#fff;border-radius:clamp(18px,3.2vw,30px);
      padding:clamp(13px,2.3vh,24px) clamp(13px,2.8vw,28px);
      box-shadow:0 10px 36px rgba(168,85,247,.1),0 0 0 3px rgba(168,85,247,.05);
      width:min(660px,calc(100vw - 22px));flex-shrink:0;
      position:relative;
    }
    .line-cols{display:flex;justify-content:space-between;align-items:center;gap:6px;position:relative;z-index:1}
    .line-col{display:flex;flex-direction:column;gap:var(--tg);align-items:center;flex-shrink:0}
    .line-node{
      width:var(--ts);height:var(--ts);border-radius:var(--tr);
      display:flex;align-items:center;justify-content:center;
      font-family:'Fredoka One',cursive;color:#fff;font-size:var(--tf);
      box-shadow:0 5px 15px rgba(0,0,0,.14),inset 0 -4px 0 rgba(0,0,0,.11);
      cursor:pointer;user-select:none;touch-action:none;
      transition:transform .15s,box-shadow .15s;flex-shrink:0;
    }
    .line-node:hover{transform:scale(1.08)}
    .line-node.selected{
      box-shadow:0 0 0 5px #fff,0 0 22px rgba(255,217,61,.9),0 5px 15px rgba(0,0,0,.14);
      transform:scale(1.12);
    }
    .line-node.ln-ok{
      box-shadow:0 0 0 4px #fff,0 0 17px rgba(34,197,94,.7),0 5px 15px rgba(0,0,0,.14);
      pointer-events:none;
    }
    .line-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:0}
    .line-node.wrong{animation:shake .38s ease-in-out}

    /* ─── Shared animations ─── */
    @keyframes match-pop{0%{transform:scale(1)}35%{transform:scale(1.32) rotate(-6deg)}65%{transform:scale(.95) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
    @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-4deg)}40%{transform:translateX(10px) rotate(4deg)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}

    /* ═══════════════════════════════════
       ADVENTURE SCREEN
    ═══════════════════════════════════ */
    .adv-q-card{
      background:#fff;border-radius:clamp(18px,3.2vw,28px);
      padding:clamp(14px,2.2vh,22px) clamp(16px,3.5vw,32px);
      box-shadow:0 10px 32px rgba(255,110,180,.12);
      text-align:center;width:min(620px,calc(100vw - 22px));flex-shrink:0;
    }
    .adv-lbl{
      font-family:'Fredoka One',cursive;font-size:clamp(11px,2vw,15px);
      color:#d8b4fe;text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;
    }
    .adv-big-letter{
      font-family:'Fredoka One',cursive;
      font-size:clamp(72px,17vw,120px);line-height:1;
      background:linear-gradient(135deg,#ff6eb4,#a855f7);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      cursor:pointer;
    }
    .adv-grid{
      display:grid;grid-template-columns:1fr 1fr;
      gap:clamp(10px,2.3vw,16px);
      width:min(460px,calc(100vw - 22px));flex-shrink:0;
    }
    .adv-choice{
      background:#fff;border:3px solid #e9d5ff;
      border-radius:clamp(15px,2.8vw,22px);
      padding:clamp(12px,2.2vh,20px) 0;
      cursor:pointer;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-size:clamp(42px,9.5vw,68px);
      line-height:1;
      box-shadow:0 5px 16px rgba(168,85,247,.08);
      transition:transform .13s,box-shadow .13s,border-color .13s;
      user-select:none;
      gap:4px;
    }
    .adv-choice:hover{transform:scale(1.07) translateY(-2px);box-shadow:0 9px 24px rgba(168,85,247,.18);border-color:#a855f7}
    .adv-choice:active{transform:scale(0.95)}
    .adv-choice.correct{
      border-color:#22c55e;background:#f0fdf4;pointer-events:none;
      animation:match-pop .5s cubic-bezier(.36,.07,.19,.97);
    }
    .adv-choice.correct:hover{transform:none;box-shadow:0 5px 16px rgba(168,85,247,.08)}
    .adv-choice.wrong{
      border-color:#ef4444;background:#fef2f2;
      animation:shake .36s ease-in-out;
    }
    .adv-word-label{
      font-family:'Fredoka One',cursive;
      font-size:clamp(13px,2.4vw,18px);
      color:#22c55e;margin-top:5px;
      display:block;line-height:1;
      animation:pop-in .3s cubic-bezier(.36,.07,.19,.97);
    }

    /* ═══════════════════════════════════
       🫧 BUBBLE POP
    ═══════════════════════════════════ */
    #bubble-screen{gap:clamp(8px,1.5vh,13px)}
    .bubble-instruction{
      background:#fff;border-radius:clamp(16px,3vw,26px);
      padding:clamp(10px,1.8vh,18px) clamp(18px,4vw,36px);
      box-shadow:0 8px 28px rgba(168,85,247,.1);
      text-align:center;width:min(540px,calc(100vw - 22px));flex-shrink:0;
    }
    .bubble-target{
      font-family:'Fredoka One',cursive;
      font-size:clamp(56px,14vw,100px);line-height:1;
      background:linear-gradient(135deg,#3b82f6,#8b5cf6);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      cursor:pointer;
    }
    .bubble-arena{
      position:relative;
      width:min(540px,calc(100vw - 22px));
      height:clamp(240px,44vh,370px);
      background:#fff;border-radius:clamp(18px,3.2vw,28px);
      box-shadow:0 8px 28px rgba(168,85,247,.1);
      overflow:hidden;flex-shrink:0;
    }
    .bubble{
      position:absolute;
      display:flex;align-items:center;justify-content:center;
      font-family:'Fredoka One',cursive;color:#fff;
      border-radius:50%;cursor:pointer;
      user-select:none;touch-action:none;
      border:4px solid rgba(255,255,255,.5);
      box-shadow:0 8px 24px rgba(0,0,0,.15),inset 0 -3px 0 rgba(0,0,0,.1),inset 4px 4px 8px rgba(255,255,255,.3);
      transition:transform .12s;
      will-change:transform;
    }
    .bubble:hover{transform:scale(1.12)}
    .bubble:active{transform:scale(0.9)}
    .bubble.pop{animation:bubble-pop .4s ease-out forwards}
    @keyframes bubble-pop{0%{transform:scale(1);opacity:1}40%{transform:scale(1.5);opacity:.7}100%{transform:scale(0);opacity:0}}
    .bubble.wrong-shake{animation:shake .35s ease-in-out}

    /* ═══════════════════════════════════
       🧩 FILL THE GAP (3-letter only)
    ═══════════════════════════════════ */
    #missing-screen{gap:clamp(8px,1.4vh,13px)}
    .missing-word-card{
      background:#fff;border-radius:clamp(18px,3.2vw,28px);
      padding:clamp(16px,2.8vh,28px) clamp(18px,4vw,38px);
      box-shadow:0 10px 32px rgba(168,85,247,.1);
      text-align:center;width:min(560px,calc(100vw - 22px));flex-shrink:0;
    }
    .missing-emoji{font-size:clamp(58px,13vw,92px);line-height:1;margin-bottom:8px;cursor:pointer}
    .missing-word-display{
      display:flex;align-items:center;justify-content:center;
      gap:clamp(8px,1.8vw,14px);margin-top:10px;
    }
    .letter-slot{
      width:clamp(52px,11vw,78px);height:clamp(52px,11vw,78px);
      border-radius:clamp(12px,2.2vw,17px);
      display:flex;align-items:center;justify-content:center;
      font-family:'Fredoka One',cursive;font-size:clamp(26px,5.5vw,42px);
      color:#fff;
      box-shadow:0 5px 15px rgba(0,0,0,.12),inset 0 -3px 0 rgba(0,0,0,.1);
    }
    .letter-slot.blank{
      background:#f3e8ff;border:3px dashed #d8b4fe;
      color:#a855f7;font-size:clamp(28px,6vw,46px);
    }
    .letter-slot.filled{animation:match-pop .4s cubic-bezier(.36,.07,.19,.97)}
    .missing-choices{
      display:flex;justify-content:center;
      gap:clamp(10px,2.2vw,16px);
      width:min(420px,calc(100vw - 22px));flex-shrink:0;
    }
    .missing-btn{
      width:clamp(60px,13vw,88px);height:clamp(60px,13vw,88px);
      border-radius:clamp(14px,2.5vw,20px);
      border:none;cursor:pointer;
      font-family:'Fredoka One',cursive;font-size:clamp(26px,5.5vw,42px);color:#fff;
      box-shadow:0 6px 18px rgba(0,0,0,.14),inset 0 -4px 0 rgba(0,0,0,.1);
      transition:transform .13s,box-shadow .13s;
      flex-shrink:0;
    }
    .missing-btn:hover{transform:scale(1.14) translateY(-4px)}
    .missing-btn:active{transform:scale(0.92)}
    .missing-btn.used{opacity:.22;pointer-events:none;transform:scale(0.85)}
    .missing-btn.wrong-ans{animation:shake .36s ease-in-out}

    /* ═══════════════════════════════════
       🎨 COLOUR MATCH
    ═══════════════════════════════════ */
    #color-screen{gap:clamp(8px,1.4vh,13px)}
    .color-instruction{
      background:#fff;border-radius:clamp(16px,3vw,26px);

function setTileSize() {
  const N    = 5;
  const vw   = window.innerWidth;
  const maxW = Math.min(660, vw - 22);
  const pad  = Math.min(22, Math.max(9, vw * 0.022)) * 2;
  const cw   = maxW - pad;
  const gap  = Math.max(5, Math.min(12, Math.round(cw * 0.02)));
  let sz     = Math.floor((cw - gap * (N - 1)) / N);
  sz         = Math.max(46, Math.min(112, sz));
  const r    = document.documentElement;
  r.style.setProperty('--ts', sz + 'px');
  r.style.setProperty('--tf', Math.round(sz * 0.49) + 'px');
  r.style.setProperty('--tr', Math.round(sz * 0.23) + 'px');

function ac() {
  if (!_ctx) _ctx = new (window.AudioContext || window.webkitAudioContext)();
  if (_ctx.state === 'suspended') _ctx.resume();
  return _ctx;
}

function osc(freq, t0, dur, type='sine', vol=0.28) {
  if (!soundOn) return;
  try {
    const c = ac(), o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = type; o.frequency.value = freq;
    const t = c.currentTime + t0;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol, t + 0.016);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.04);
  } catch(e) {}
}

    const c = ac();
    const loopDur = MENU_LOOP_BEATS * MENU_BEAT;
    MENU_MEL.forEach(([freq,beat,dur]) => {
      const t0 = bgStart - c.currentTime + beat * MENU_BEAT;
      if (t0 < -0.05) return;
      const o = c.createOscillator(), vib = c.createOscillator(), vibG = c.createGain();
      const g = c.createGain(), lp = c.createBiquadFilter();
      vib.frequency.value = 4.8; vibG.gain.value = 2.5;
      vib.connect(vibG); vibG.connect(o.frequency);
      lp.type = 'lowpass'; lp.frequency.value = 2200;
      o.type = 'sine'; o.frequency.value = freq;
      o.connect(lp); lp.connect(g); g.connect(bgGain);
      const t = c.currentTime + t0;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.55,t+0.08);
      g.gain.setValueAtTime(0.55,t+dur*0.72);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.start(t); o.stop(t+dur+0.06); vib.start(t); vib.stop(t+dur+0.06);
    });
    MENU_PADS.forEach(([freqs,beat,dur]) => {
      freqs.forEach(freq => {
        const t0 = bgStart - c.currentTime + beat * MENU_BEAT;
        if (t0 < -0.05) return;
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        o.connect(g); g.connect(bgGain);
        const t = c.currentTime + t0;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.12,t+0.45);
        g.gain.setValueAtTime(0.12,t+dur*0.8);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.start(t); o.stop(t+dur+0.1);
      });
    });
    bgStart += loopDur;
    bgTimer = setTimeout(menuBgLoop, (loopDur - 0.5) * 1000);
  } catch(e) {}
}

/* Game Music */
const GAME_BPM = 118, GAME_BEAT = 60/118, GAME_8 = GAME_BEAT*0.5;
const GAME_MEL = [
  [523,0,GAME_8*.72],[659,0.5,GAME_8*.72],[784,1,GAME_BEAT*.72],
  [880,2,GAME_8*.72],[784,2.5,GAME_8*.72],[659,3,GAME_8*.72],

const GAME_BASS = [
  [131,0,GAME_8*.8],[131,1,GAME_8*.8],[147,2,GAME_8*.8],[147,3,GAME_8*.8],
  [131,4,GAME_8*.8],[131,5,GAME_8*.8],[110,6,GAME_8*.8],[110,7,GAME_8*.8],
  [131,8,GAME_8*.8],[131,9,GAME_8*.8],[147,10,GAME_8*.8],[165,11,GAME_8*.8],
  [131,12,GAME_8*.8],[131,13,GAME_8*.8],[98,14,GAME_8*.8],[110,15,GAME_BEAT*.8],
];
const GAME_CHORDS = [
  [[261,329],0.5,GAME_8*.5],[[261,329],2.5,GAME_8*.5],
  [[220,277],4.5,GAME_8*.5],[[220,277],6.5,GAME_8*.5],
  [[261,329],8.5,GAME_8*.5],[[247,311],10.5,GAME_8*.5],
  [[261,329],12.5,GAME_8*.5],[[196,247],14.5,GAME_8*.5],
];
const GAME_LOOP_BEATS = 16;

function gameBgLoop() {
  if (!musicOn || !soundOn || currentBgTrack !== 'game') return;
  try {
    const c = ac();
    const loopDur = GAME_LOOP_BEATS * GAME_BEAT;
    GAME_MEL.forEach(([freq,beat,dur]) => {
      const t0 = bgStart - c.currentTime + beat * GAME_BEAT;
      if (t0 < -0.05) return;
      const o = c.createOscillator(), g = c.createGain(), lp = c.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 1800;
      o.type = 'square'; o.frequency.value = freq;
      o.connect(lp); lp.connect(g); g.connect(bgGain);
      const t = c.currentTime + t0;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.12,t+0.012);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.start(t); o.stop(t+dur+0.03);
    });
    GAME_BASS.forEach(([freq,beat,dur]) => {
      const t0 = bgStart - c.currentTime + beat * GAME_BEAT;
      if (t0 < -0.05) return;
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'triangle'; o.frequency.value = freq;
      o.connect(g); g.connect(bgGain);
      const t = c.currentTime + t0;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.28,t+0.018);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur);
      o.start(t); o.stop(t+dur+0.03);
    });
    GAME_CHORDS.forEach(([freqs,beat,dur]) => {
      freqs.forEach(freq => {
        const t0 = bgStart - c.currentTime + beat * GAME_BEAT;
        if (t0 < -0.05) return;
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'triangle'; o.frequency.value = freq;
        o.connect(g); g.connect(bgGain);
        const t = c.currentTime + t0;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.09,t+0.01);
        g.gain.exponentialRampToValueAtTime(0.001,t+dur);
        o.start(t); o.stop(t+dur+0.02);
      });
    });
    bgStart += loopDur;
    bgTimer = setTimeout(gameBgLoop, (loopDur - 0.4) * 1000);
  } catch(e) {}
}

function startMusic(track) {
  if (!soundOn) return;
  if (musicOn && currentBgTrack === track) return;
  stopMusic();
  currentBgTrack = track || 'game';
  try {
    const c = ac();
    musicOn = true;
    bgGain = c.createGain();
    bgGain.gain.value = currentBgTrack === 'menu' ? 0.055 : 0.072;
    bgGain.connect(c.destination);
    bgStart = c.currentTime + 0.12;
    if (currentBgTrack === 'menu') menuBgLoop();
    else gameBgLoop();
  } catch(e) {}
}

function stopMusic() {
  musicOn = false;
  currentBgTrack = '';
  if (bgTimer) { clearTimeout(bgTimer); bgTimer = null; }
  try {
    if (bgGain) {
      const oldGain = bgGain;
      bgGain = null;
      oldGain.gain.linearRampToValueAtTime(0, ac().currentTime + 0.35);
      setTimeout(() => { try { oldGain.disconnect(); } catch(e){} }, 450);
    }
  } catch(e) {}
}

/* Speech */
let _bestVoice = null;
function pickVoice() {
  if (_bestVoice) return _bestVoice;
  const vv = window.speechSynthesis.getVoices();
  if (!vv.length) return null;
  const priority = [
    v => /en[-_]GB/.test(v.lang) && /Premium|Enhanced|Neural/.test(v.name),
    v => /en[-_]US/.test(v.lang) && /Premium|Enhanced|Neural/.test(v.name),
    v => /en/.test(v.lang) && /Premium|Enhanced|Neural/.test(v.name),
    v => /en[-_]GB/.test(v.lang) && /Samantha|Karen|Serena|Moira|Fiona|Google/.test(v.name),
    v => /en[-_]US/.test(v.lang) && /Samantha|Zira|Google US|Google/.test(v.name),
    v => /en[-_]GB/.test(v.lang),
    v => v.lang.startsWith('en') && !v.name.toLowerCase().includes('compact'),
    v => v.lang.startsWith('en'),
  ];
  for (const test of priority) {
    const found = vv.find(test);
    if (found) { _bestVoice = found; return found; }
  }
  return vv[0] || null;
}

function speak(text) {
  if (!soundOn || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voice = pickVoice();
  if (voice) u.voice = voice;
  const isLetter = text.trim().length === 1;
  u.rate   = isLetter ? 0.78 : 0.88;
  u.pitch  = isLetter ? 1.15 : 1.08;
  u.volume = 1;
  window.speechSynthesis.speak(u);
}

/* DRAG — bidirectional: drag big→small or small→big */
function buildDrag(letters) {
  const dropRow = document.getElementById('drop-row');
  const dragRow = document.getElementById('drag-row');
  dropRow.innerHTML = '';
  dragRow.innerHTML = '';

  // Build top row (big letters)
  letters.forEach((letter, i) => {
    const [bg, sh] = COLORS[i % COLORS.length];
    const el = document.createElement('div');
    el.className = 'drop-zone';
    el.dataset.letter = letter;
    el.textContent = letter;
    el.style.background = `linear-gradient(145deg,${bg},${sh})`;
    el.draggable = true;
    attachDragEvents(el, letter);
    el.addEventListener('click', () => { sfxClick(); speak(letter); });
    dropRow.appendChild(el);
  });

  // Build bottom row (small letters, shuffled)
  shuffle(letters).forEach(letter => {
    const i = letters.indexOf(letter);
    const [bg, sh] = COLORS[i % COLORS.length];
    const el = document.createElement('div');
    el.className = 'letter-card';
    el.dataset.letter = letter;
    el.textContent = letter.toLowerCase();
    el.style.background = `linear-gradient(145deg,${bg},${sh})`;
    el.draggable = true;
    attachDragEvents(el, letter);
    dragRow.appendChild(el);
  });
}

function attachDragEvents(el, letter) {
  el.addEventListener('dragstart', e => {
    dragSrc = el; dragLetter = letter;
    el.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    sfxSelect();
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    dragSrc = null; dragLetter = null;
    document.querySelectorAll('.drop-zone,.letter-card').forEach(z => z.classList.remove('over'));
  });
  el.addEventListener('dragover',  e => {
    e.preventDefault();
    if (el !== dragSrc && !el.classList.contains('matched-done')) el.classList.add('over');
  });
  el.addEventListener('dragleave', () => el.classList.remove('over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('over');
    onDrop(el);
  });
  el.addEventListener('touchstart', onTouchStart, { passive: false });
  el.addEventListener('touchmove',  onTouchMove,  { passive: false });
  el.addEventListener('touchend',   onTouchEnd,   { passive: false });
}

function onDrop(target) {
  if (!dragSrc || !dragLetter) return;
  if (target === dragSrc) return;
  if (target.classList.contains('matched-done')) return;
  if (target.dataset.letter === dragLetter) {
    doBothMatch(dragSrc, target);
  } else {
    doWrongShake(target); sfxWrong();
  }
}

function doBothMatch(tileA, tileB) {
  matched++;
  lightStar('g-stars', matched - 1);
  [tileA, tileB].forEach(t => {
    t.classList.add('matched', 'matched-done');
    t.draggable = false;
    t.style.pointerEvents = 'none';
    t.addEventListener('animationend', () => t.classList.remove('matched'), { once: true });
    t.style.boxShadow = '0 0 0 5px #fff,0 0 22px rgba(34,197,94,.7),0 8px 20px rgba(0,0,0,.15)';
    const chk = document.createElement('div'); chk.className = 'check-badge'; chk.textContent = '✓';
    t.appendChild(chk);
  });
  showBingo(); sfxDing();
  setTimeout(() => speak(tileA.dataset.letter), 300);
  if (matched >= 5) setTimeout(showRoundSuccess, 700);
}

function onTouchStart(e) {
  e.preventDefault();
  const t = e.touches[0];
  touchSrc = e.currentTarget;
  if (touchSrc.classList.contains('matched-done')) { touchSrc = null; return; }
  dragLetter = touchSrc.dataset.letter;
  sfxSelect(); speak(dragLetter);
  const r = touchSrc.getBoundingClientRect();
  touchClone = touchSrc.cloneNode(true);
  Object.assign(touchClone.style, {
    position:'fixed', left:(t.clientX - r.width/2)+'px', top:(t.clientY - r.height/2)+'px',
    width:r.width+'px', height:r.height+'px',
    borderRadius:getComputedStyle(touchSrc).borderRadius,
    pointerEvents:'none', zIndex:'9999', opacity:'.9',
    transform:'scale(1.15) rotate(5deg)', boxShadow:'0 18px 44px rgba(0,0,0,.28)',
  });
  document.body.appendChild(touchClone);
  touchSrc.classList.add('dragging');
}
function onTouchMove(e) {
  e.preventDefault();
  if (!touchClone) return;
  const t = e.touches[0];
  const r = touchSrc.getBoundingClientRect();
  touchClone.style.left = (t.clientX - r.width/2)+'px';
  touchClone.style.top  = (t.clientY - r.height/2)+'px';
  document.querySelectorAll('.drop-zone,.letter-card').forEach(z => {
    if (z === touchSrc || z.classList.contains('matched-done')) return;
    const zr = z.getBoundingClientRect();
    z.classList.toggle('over',
      t.clientX >= zr.left && t.clientX <= zr.right &&
      t.clientY >= zr.top  && t.clientY <= zr.bottom);
  });
}
function onTouchEnd(e) {
  e.preventDefault();
  if (!touchClone) return;
  const t = e.changedTouches[0];
  let hit = null;
  document.querySelectorAll('.drop-zone,.letter-card').forEach(z => {
    z.classList.remove('over');
    if (z === touchSrc || z.classList.contains('matched-done')) return;
    const zr = z.getBoundingClientRect();
    if (t.clientX >= zr.left && t.clientX <= zr.right &&
        t.clientY >= zr.top  && t.clientY <= zr.bottom) hit = z;
  });
  touchSrc.classList.remove('dragging');
  if (hit) {
    if (hit.dataset.letter === dragLetter) doBothMatch(touchSrc, hit);
    else { doWrongShake(hit); sfxWrong(); }
  }
  touchClone.remove(); touchClone = null; touchSrc = null; dragLetter = null;
}

/* FLIP */
function buildFlip(letters) {
  const pairs = [];
  letters.forEach((l, i) => {
    pairs.push({ letter:l, display:l,              ci:i });
    pairs.push({ letter:l, display:l.toLowerCase(), ci:i });
  });
  const grid = document.getElementById('mem-grid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(5, var(--ts))`;
  shuffle(pairs).forEach(({ letter, display, ci }) => {
    const [bg, sh] = COLORS[ci % COLORS.length];
    const card = document.createElement('div');
    card.className = 'mem-card';
    card.dataset.letter = letter;
    card.innerHTML = `
      <div class="mem-inner">
        <div class="mem-face mem-back">?</div>
        <div class="mem-face mem-front" style="background:linear-gradient(145deg,${bg},${sh})">${display}</div>
      </div>`;
    card.addEventListener('click', () => onFlipClick(card, letter, display));
    grid.appendChild(card);
  });
}

function onFlipClick(card, letter, display) {
  if (flipLocked) return;
  if (card.classList.contains('flipped') || card.classList.contains('mem-ok')) return;
  sfxFlip(); speak(display);
  card.classList.add('flipped');
  flipFlipped.push(card);
  if (flipFlipped.length === 2) {
    flipLocked = true;
    const [a, b] = flipFlipped;
    if (a.dataset.letter === b.dataset.letter) {
      setTimeout(() => {
        a.classList.add('mem-ok'); b.classList.add('mem-ok');
        a.style.pointerEvents = 'none'; b.style.pointerEvents = 'none';
        matched++;
        lightStar('g-stars', matched - 1);
        showBingo(); sfxDing();
        setTimeout(() => speak(letter), 300);
        flipFlipped = []; flipLocked = false;
        if (matched >= 5) setTimeout(showRoundSuccess, 700);
      }, 380);
    } else {
      setTimeout(() => {
        a.classList.remove('flipped'); b.classList.remove('flipped');
        sfxWrong();
        a.style.opacity = '.45'; b.style.opacity = '.45';
        setTimeout(() => { a.style.opacity = '1'; b.style.opacity = '1'; }, 440);
        flipFlipped = []; flipLocked = false;
      }, 860);
    }
  }
}

/* LINE */
function buildLine(letters) {
  document.getElementById('line-svg').innerHTML = '';
  const leftCol  = document.getElementById('line-left');
  const rightCol = document.getElementById('line-right');
  leftCol.innerHTML  = '';
  rightCol.innerHTML = '';
  shuffle(letters).forEach(letter => {
    const ci = letters.indexOf(letter);
    const [bg, sh] = COLORS[ci % COLORS.length];
    leftCol.appendChild(makeNode(letter, letter,              bg, sh, 'left'));
  });
  shuffle(letters).forEach(letter => {
    const ci = letters.indexOf(letter);
    const [bg, sh] = COLORS[ci % COLORS.length];
    rightCol.appendChild(makeNode(letter, letter.toLowerCase(), bg, sh, 'right'));
  });
}

function makeNode(letter, display, bg, sh, side) {
  const el = document.createElement('div');
  el.className = 'line-node';
  el.dataset.letter = letter;
  el.dataset.side   = side;
  el.textContent    = display;
  el.style.background = `linear-gradient(145deg,${bg},${sh})`;
  el.addEventListener('click', () => onLineClick(el, letter, side));
  return el;
}

function onLineClick(el, letter, side) {
  if (el.classList.contains('ln-ok')) return;
  sfxClick(); speak(letter);
  if (!lineFrom) {
    el.classList.add('selected'); lineFrom = { el, letter, side }; return;
  }
  if (lineFrom.el === el) {
    el.classList.remove('selected'); lineFrom = null; return;
  }
  if (lineFrom.side === side) {
    lineFrom.el.classList.remove('selected');
    el.classList.add('selected');
    lineFrom = { el, letter, side }; return;
  }
  const from = lineFrom; lineFrom = null;
  from.el.classList.remove('selected');
  if (from.letter === letter) {
    const ci = [...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'].indexOf(letter);
    drawLine(from.el, el, COLORS[ci % COLORS.length][0]);
    from.el.classList.add('ln-ok'); el.classList.add('ln-ok');
    matched++;
    lightStar('g-stars', matched - 1);
    showBingo(); sfxDing();
    setTimeout(() => speak(letter), 280);
    if (matched >= 5) setTimeout(showRoundSuccess, 700);
  } else {
    doWrongShake(el); sfxWrong();
  }
}

function drawLine(fromEl, toEl, color) {
  const svg  = document.getElementById('line-svg');
  const card = document.getElementById('line-panel');
  const cr   = card.getBoundingClientRect();
  const fr   = fromEl.getBoundingClientRect();
  const tr   = toEl.getBoundingClientRect();
  const x1 = fr.right - cr.left, y1 = fr.top - cr.top + fr.height / 2;
  const x2 = tr.left  - cr.left, y2 = tr.top - cr.top + tr.height / 2;
  const ln = document.createElementNS('http://www.w3.org/2000/svg','line');
  ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
  ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
  ln.setAttribute('stroke',color); ln.setAttribute('stroke-width','7');
  ln.setAttribute('stroke-linecap','round'); ln.setAttribute('opacity','0.85');
  svg.appendChild(ln);
}

function startAdventure(type) {
  advType      = type;
  advIdx       = 0;
  advLocked    = false;
  advQuestions = buildAdvQuestions(type, 5);
  currentGameMode = 'classic';
  if (!advQuestions.length) return;
  document.getElementById('adv-lbl').textContent = type === 'starts' ? 'STARTS WITH' : 'ENDS WITH';
  document.querySelectorAll('#adv-stars .star').forEach(s => s.classList.remove('lit'));
  showScreen('adv-screen');
  showAdvQ();
  setTimeout(() => startMusic('game'), 240);
}

function buildAdvQuestions(type, count) {
  const src = type === 'starts' ? BY_FIRST : BY_LAST;
  const usedEmoji = new Set();
  const questions  = [];
  let pool = shuffle(Object.keys(src));
  while (questions.length < count && pool.length > 0) {
    const li = pool.findIndex(l => (src[l] || []).some(w => !usedEmoji.has(w[0])));
    if (li === -1) break;
    const letter = pool.splice(li, 1)[0];
    const cpArr = (src[letter] || []).filter(w => !usedEmoji.has(w[0]));
    const correct = cpArr[Math.floor(Math.random() * cpArr.length)];
    usedEmoji.add(correct[0]);
    const wrongPool = shuffle(
      ADV_WORDS.filter(w => {
        const ltr = type === 'starts' ? w[2] : w[3];
        return ltr !== letter && !usedEmoji.has(w[0]);
      })
    ).slice(0, 3);
    wrongPool.forEach(w => usedEmoji.add(w[0]));
    if (wrongPool.length < 3) {
      ADV_WORDS.filter(w => {
        const ltr = type === 'starts' ? w[2] : w[3];
        return ltr !== letter && w[0] !== correct[0] && !wrongPool.find(x => x[0] === w[0]);
      }).forEach(w => { if (wrongPool.length < 3) wrongPool.push(w); });
    }
    if (wrongPool.length >= 3) {
      questions.push({
        letter,
        options: shuffle([
          { emoji: correct[0], word: correct[1], isCorrect: true  },
          ...wrongPool.map(w => ({ emoji: w[0], word: w[1], isCorrect: false })),
        ]),
      });
    }
  }
  return questions;
}

function showAdvQ() {
  if (advIdx >= advQuestions.length) return;
  advLocked = false;
  const q = advQuestions[advIdx];
  document.getElementById('adv-pill').textContent = `${advIdx + 1} / ${advQuestions.length}`;
  document.getElementById('adv-letter').textContent = q.letter;

    el.className   = 'adv-choice';
    el.textContent = emoji;
    el.addEventListener('click', () => onAdvChoice(el, isCorrect, word));
    grid.appendChild(el);
  });
}

function onAdvChoice(el, isCorrect, word) {
  if (advLocked) return;
  if (el.classList.contains('correct') || el.classList.contains('wrong')) return;

    el.classList.add('wrong');

  }
}

const BUBBLE_COLORS = [
  '#ef4444','#f97316','#eab308','#22c55e',
  '#3b82f6','#8b5cf6','#ec4899','#14b8a6',
  '#f43f5e','#a855f7',
];
const ALPHABET = [...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'];

function startBubble() {
  bubbleRound = 1; bubbleLocked = false;

  showScreen('bubble-screen');

function initBubbleRound() {
  bubbleLocked = false;
  bubbleAnimFrames.forEach(id => cancelAnimationFrame(id));
  bubbleAnimFrames = [];

  const arena = document.getElementById('bubble-arena');
  arena.innerHTML = '';

  bubbleTarget = ALPHABET[Math.floor(Math.random() * 26)];
  document.getElementById('bubble-target').textContent = bubbleTarget;
  document.getElementById('bubble-pill').textContent = `${bubbleRound} / ${ROUNDS}`;
  setTimeout(() => speak(bubbleTarget), 320);

  const others = shuffle(ALPHABET.filter(l => l !== bubbleTarget)).slice(0, 6);
  const allLetters = shuffle([bubbleTarget, bubbleTarget, ...others]);

  const arenaRect = arena.getBoundingClientRect();
  const arW = arenaRect.width  || window.innerWidth - 22;
  const arH = arenaRect.height || 280;
  const bSize = Math.min(76, Math.max(52, arW / 7));

  const positions = [];
  allLetters.forEach((letter, idx) => {
    let x, y, tries = 0;
    do {
      x = bSize/2 + Math.random() * (arW - bSize * 1.5);
      y = bSize/2 + Math.random() * (arH - bSize * 1.5);
      tries++;
    } while (tries < 50 && positions.some(p => Math.hypot(p.x - x, p.y - y) < bSize * 1.2));
    positions.push({ x, y });

    const isCorrect = letter === bubbleTarget;
    const color = BUBBLE_COLORS[idx % BUBBLE_COLORS.length];
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.dataset.correct = isCorrect ? '1' : '0';
    bubble.textContent = letter;
    Object.assign(bubble.style, {
      width: bSize + 'px', height: bSize + 'px',
      fontSize: Math.round(bSize * 0.47) + 'px',
      left: x + 'px', top: y + 'px',
      background: `radial-gradient(circle at 35% 35%, ${color}cc, ${color})`,
    });
    bubble.addEventListener('click', e => onBubbleTap(e, bubble, letter, isCorrect));
    bubble.addEventListener('touchend', e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      spawnRipple(t.clientX, t.clientY);
      onBubbleTap(e, bubble, letter, isCorrect);
    }, { passive: false });
    arena.appendChild(bubble);

    let t0 = null;
    const dx = (Math.random() - 0.5) * 40;
    const dy = (Math.random() - 0.5) * 25;
    const period = 2000 + Math.random() * 2000;
    function floatTick(ts) {
      if (!t0) t0 = ts;
      const elapsed = (ts - t0) % period;
      const phase = (elapsed / period) * Math.PI * 2;
      const ox = Math.sin(phase) * dx;
      const oy = Math.cos(phase * 0.7) * dy;
      bubble.style.transform = `translate(${ox}px, ${oy}px)`;
      bubbleAnimFrames.push(requestAnimationFrame(floatTick));
    }
    bubbleAnimFrames.push(requestAnimationFrame(floatTick));
  });
}

function onBubbleTap(e, bubble, letter, isCorrect) {
  if (bubbleLocked) return;
  if (bubble.classList.contains('pop')) return;
  sfxClick(); speak(letter);
  if (isCorrect) {
    bubbleLocked = true;
    bubble.classList.add('pop');
    sfxPop(); sfxDing(); showBingo();

    if (gMode === 'combo') {
      lightStar('bubble-stars', 0);
      setTimeout(showComboSuccess, 800);
    } else if (bubbleRound >= ROUNDS) {
      lightStar('bubble-stars', bubbleRound - 1);
      setTimeout(() => {
        sfxFanfare(); confetti();
        document.getElementById('s-emoji').textContent = '🏆';
        document.getElementById('s-title').textContent = 'WIN!';
        document.getElementById('s-next').style.display = 'none';
        document.getElementById('success-overlay').classList.add('active');
      }, 900);
    } else {
      lightStar('bubble-stars', bubbleRound - 1);
      setTimeout(() => {
        document.getElementById('s-emoji').textContent = S_EMOJI[bubbleRound] || '🌟';
        document.getElementById('s-title').textContent = S_MSG[bubbleRound]   || 'WOW!';
        document.getElementById('s-next').style.display = '';
        document.getElementById('s-next').textContent = '🚀 Next!';
        document.getElementById('success-overlay').classList.add('active');
      }, 800);
    }
  } else {
    bubble.classList.remove('wrong-shake'); void bubble.offsetWidth;
    bubble.classList.add('wrong-shake');
    bubble.addEventListener('animationend', () => bubble.classList.remove('wrong-shake'), { once: true });
    sfxWrong();
  }
}

  { name:'RED',    hex:'#ef4444' },

  { name:'GREEN',  hex:'#22c55e' },
  { name:'YELLOW', hex:'#eab308' },

function buildColorQuestions(count) {
  const qs = [];
  const pool = shuffle([...COLOR_PALETTE]);
  for (let i = 0; i < count && i < pool.length; i++) {
    const correct = pool[i];
    const wrongs = shuffle(COLOR_PALETTE.filter(c => c.name !== correct.name)).slice(0, 3);
    qs.push({
      word: correct.name, correctHex: correct.hex,
      options: shuffle([correct, ...wrongs]),
    });
  }
  return qs;
}

function confetti() {
  const shapes = ['●','■','▲','★','♦','❤'];
  const cols   = ['#ff6eb4','#ffd93d','#22c55e','#3b82f6','#a855f7','#f97316'];
  for (let i = 0; i < 68; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'cp';
      c.style.cssText = `left:${Math.random()*100}vw;top:-48px;color:${cols[Math.random()*cols.length|0]};font-size:${10+Math.random()*21}px;animation-duration:${2.3+Math.random()*2}s;`;
      c.textContent = shapes[Math.random()*shapes.length|0];
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 5000);
    }, i * 38);
  }
}

/* Voices */
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => { _bestVoice = null; pickVoice(); });
}

/* First interaction → menu music */
function onFirstInteraction() {
  document.removeEventListener('click',      onFirstInteraction);
  document.removeEventListener('touchstart', onFirstInteraction);
  setTimeout(() => {
    const active = document.querySelector('.screen.active');
    if (soundOn && !musicOn && active && active.id === 'home-screen') startMusic('menu');
  }, 80);
}
document.addEventListener('click',      onFirstInteraction, { once: true });
document.addEventListener('touchstart', onFirstInteraction, { once: true });
</script>
</body>
